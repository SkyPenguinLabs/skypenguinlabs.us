<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A standalone SkyPenguinLabs war room terminal story.">
    <title>War Room | SkyPenguinLabs</title>
    <style>
      :root {
        color-scheme: dark;
        --black: #000000;
        --white: #f4f4f4;
        --gray: #9a9a9a;
        --dim: #5e5e5e;
        --edge: #242424;
        --mono: ui-monospace, "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-width: 0;
        min-height: 100%;
        margin: 0;
        background: var(--black);
      }

      body {
        overflow: hidden;
        color: var(--white);
        font-family: var(--mono);
        font-size: clamp(14px, 1.9vw, 19px);
        line-height: 1.55;
        letter-spacing: 0;
      }

      ::selection {
        background: var(--white);
        color: var(--black);
      }

      .terminal-stage {
        width: 100vw;
        min-height: 100svh;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: max(18px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
        background: #000000;
      }

      .terminal {
        width: min(100%, 78ch);
        height: min(78svh, 760px);
        min-height: 360px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: clamp(12px, 2vh, 22px);
        color: var(--white);
      }

      .accent,
      .status {
        margin: 0;
        overflow-wrap: anywhere;
        color: var(--gray);
        font: inherit;
        line-height: 1.25;
        white-space: pre-wrap;
      }

      .accent {
        text-align: center;
      }

      .status {
        min-height: 1.25em;
        text-align: right;
      }

      .terminal-output {
        position: relative;
        min-width: 0;
        overflow-y: auto;
        overflow-x: hidden;
        overscroll-behavior: contain;
        scrollbar-width: thin;
        scrollbar-color: var(--dim) var(--black);
        border-block: 1px solid var(--edge);
        padding: min(16vh, 120px) 0 min(16vh, 120px);
      }

      .terminal-output::-webkit-scrollbar {
        width: 8px;
      }

      .terminal-output::-webkit-scrollbar-track {
        background: var(--black);
      }

      .terminal-output::-webkit-scrollbar-thumb {
        background: var(--dim);
      }

      .passage {
        width: min(100%, 68ch);
        margin: 0 auto;
        overflow-wrap: break-word;
        color: var(--white);
        white-space: pre-wrap;
      }

      .passage + .passage {
        margin-top: 2.2em;
      }

      .cursor {
        display: inline-block;
        width: 0.64ch;
        height: 1.08em;
        margin-left: 0.16ch;
        opacity: 1;
        transform: translateY(0.16em);
        background: var(--white);
        animation: blink 720ms steps(2, start) infinite;
      }

      .home-link {
        position: fixed;
        right: max(16px, env(safe-area-inset-right));
        bottom: max(16px, env(safe-area-inset-bottom));
        z-index: 2;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 9ch;
        min-height: 36px;
        padding: 9px 12px;
        border: 1px solid var(--edge);
        background: var(--black);
        color: var(--gray);
        font: 700 12px/1 var(--mono);
        letter-spacing: 0;
        text-decoration: none;
        text-transform: uppercase;
      }

      .home-link:hover,
      .home-link:focus-visible {
        border-color: var(--gray);
        color: var(--white);
      }

      .terminal-stage:focus {
        outline: none;
      }

      .terminal-stage:focus-visible .terminal {
        outline: 1px solid var(--dim);
        outline-offset: 8px;
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      @media (max-width: 540px) {
        body {
          font-size: 13px;
          line-height: 1.5;
        }

        .terminal {
          width: min(100%, 62ch);
          height: min(82svh, 720px);
          min-height: 0;
        }

        .terminal-output {
          padding-block: min(14vh, 84px);
        }

        .accent,
        .status {
          font-size: 12px;
        }

        .home-link {
          right: max(12px, env(safe-area-inset-right));
          bottom: max(12px, env(safe-area-inset-bottom));
          min-height: 34px;
          padding-inline: 10px;
          font-size: 11px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .cursor {
          animation-duration: 1.4s;
        }
      }
    </style>
  </head>
  <body>
    <main class="terminal-stage" tabindex="-1" aria-label="War Room terminal story" data-war-room>
      <section class="terminal" aria-live="polite" aria-atomic="false">
        <pre class="accent" aria-hidden="true">        /\
   ____/  \____
  /___  WR  ___\
      \____/</pre>
        <div class="terminal-output" data-terminal-output></div>
        <pre class="status" data-terminal-status aria-hidden="true">SPACE / ENTER / CLICK</pre>
      </section>
    </main>
    <a class="home-link" href="/" aria-label="Go to home">Home</a>

    <script id="war-room-story" type="text/plain">
:: WAR ROOM PLACEHOLDER ::

The map table is black glass. White pins blink where the old alerts learned to breathe.
No one raises their voice.
Every screen waits for the same impossible green line.
---
[pause=1200]
01:17

The first operator writes: LISTEN BEFORE YOU MOVE.
The second marks the outbound paths with a dull pencil.
Somewhere under the floor, cooling fans count seconds in square waves.
---
      /\        /\
  ___/  \______/  \___
 /__   STONE SIGNAL  __\
    \____      ____/
         \____/

The room answers in plain text:
"Hold the door. Burn the noise. Keep the proof."
---
[pause=900]
There is no victory banner.

Only a checksum, a timestamp, and the small mercy of a clean diff.
The team copies the evidence twice.
The cursor keeps watch.
---
FINAL LINE:
War Room placeholder copy ends here. Replace this story when the real incident chronicle is ready.
    </script>

    <script>
      (function () {
        const output = document.querySelector("[data-terminal-output]");
        const status = document.querySelector("[data-terminal-status]");
        const stage = document.querySelector("[data-war-room]");
        const rawStory = document.getElementById("war-room-story").textContent;
        const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const typeDelay = reducedMotion ? 0 : 18;
        const passages = rawStory
          .trim()
          .split(/\n---\n/g)
          .map((passage) => passage.replace(/^\[pause=\d+\]\n?/gm, "").trimEnd())
          .filter(Boolean);

        let passageIndex = 0;
        let charIndex = 0;
        let activeNode = null;
        let activeTextNode = null;
        let cursorNode = null;
        let isTyping = false;
        let isComplete = false;

        function scrollToLatest() {
          output.scrollTop = output.scrollHeight;
        }

        function setStatus(text) {
          status.textContent = text;
        }

        function placeCursor(node) {
          if (!cursorNode) {
            cursorNode = document.createElement("span");
            cursorNode.className = "cursor";
            cursorNode.dataset.cursor = "true";
            cursorNode.setAttribute("aria-hidden", "true");
          }
          node.appendChild(cursorNode);
        }

        function finishPassage() {
          activeNode.dataset.complete = "true";
          isTyping = false;
          charIndex = 0;
          placeCursor(activeNode);
          scrollToLatest();

          if (passageIndex === passages.length - 1) {
            isComplete = true;
            setStatus("END OF LINE");
            stage.dataset.storyComplete = "true";
            return;
          }

          passageIndex += 1;
          setStatus("AWAITING INPUT");
        }

        function typeNextCharacter() {
          if (!activeNode || !activeTextNode) return;

          const passage = passages[passageIndex];
          if (charIndex >= passage.length) {
            finishPassage();
            return;
          }

          activeTextNode.data += passage.charAt(charIndex);
          charIndex += 1;
          scrollToLatest();
          window.setTimeout(typeNextCharacter, typeDelay);
        }

        function startPassage() {
          if (isTyping || isComplete) return;
          isTyping = true;
          setStatus("RECEIVING");

          activeNode = document.createElement("pre");
          activeNode.className = "passage";
          activeNode.dataset.passage = String(passageIndex);
          activeNode.dataset.complete = "false";
          activeTextNode = document.createTextNode("");
          activeNode.appendChild(activeTextNode);
          output.appendChild(activeNode);
          placeCursor(activeNode);

          if (typeDelay === 0) {
            activeTextNode.data = passages[passageIndex];
            finishPassage();
            return;
          }

          typeNextCharacter();
        }

        function advance(event) {
          if (event.type === "keydown" && event.key !== " " && event.key !== "Enter") return;
          if (event.type === "keydown") event.preventDefault();
          if (isTyping || isComplete) return;
          startPassage();
        }

        window.__warRoomPassages = passages.slice();
        stage.dataset.passageTotal = String(passages.length);
        stage.addEventListener("click", advance);
        stage.addEventListener("touchend", advance, { passive: true });
        window.addEventListener("keydown", advance);
        startPassage();
      })();
    </script>
  </body>
</html>
