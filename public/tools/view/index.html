<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="SkyPenguinLabs tool detail page.">
    <title>Tool Detail | /tools</title>
    <link rel="icon" href="/static/assets/brand/spl-stamp.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/assets/css/site.css">
  </head>
  <body>
    <div class="site-shell" data-site-shell>
      <main id="main" class="container" data-tool-detail-root>
        <section class="detail-hero">
          <h1 data-tool-name></h1>
          <p class="lead" data-tool-purpose></p>
        </section>
        <section class="detail-layout">
          <article class="detail-main">
            <div class="detail-header-top">
              <div>
                <h2>Operational summary</h2>
              </div>
              <ul class="meta-list" data-tool-meta></ul>
            </div>
            <div class="detail-copy">
              <p data-tool-summary></p>
            </div>
            <section class="detail-section">
              <h2>Key capabilities</h2>
              <ul data-tool-capabilities></ul>
            </section>
            <section class="detail-section">
              <h2>Usage snapshot</h2>
              <pre><code data-tool-usage></code></pre>
            </section>
            <section class="detail-section detail-docs">
              <h2>Documentation</h2>
              <div data-tool-docs></div>
            </section>
          </article>
          <aside class="detail-aside">
            <div>
              <h3 data-tool-category></h3>
            </div>
            <div>
              <ul class="detail-aside-list" data-tool-related></ul>
            </div>
            <a class="return-link" href="/tools/">Back to /tools</a>
          </aside>
        </section>
      </main>
    </div>
    <script src="/static/assets/js/projects-data.js"></script>
    <script src="/static/assets/js/site.js"></script>
    <script>
      window.toolsPagesConfig = {
        detailBasePath: "/tools/view/",
        docsBasePath: "/content/tools/"
      };
    </script>
    <script type="module" src="/static/assets/js/tools.js"></script>
  </body>
</html>
